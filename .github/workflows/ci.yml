name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --features gvp,frp

      - name: Run tests
        run: cargo test --lib --features gvp,frp
